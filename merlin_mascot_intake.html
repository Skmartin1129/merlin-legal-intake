<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merlin Legal Intake</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

<style>
:root{--navy:#0B1F3A;--orange:#F47920;--orange-light:#F9A55A;--orange-pale:#FEF0E4;--cream:#FDFAF4;--bg2:#fff;--border:#E8EDF5;--green:#2D7A4F;--green-bg:#EAF5EF;--text:#1a2332;--muted:#6B7A90;--r:20px;--rs:12px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse at 20% 10%,rgba(244,121,32,.06) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(11,31,58,.05) 0%,transparent 50%);pointer-events:none;z-index:0;}
.paw-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;opacity:.04;}
.paw-bg span{position:absolute;animation:floatPaw 20s infinite linear;}
@keyframes floatPaw{0%{transform:translateY(0) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100vh) rotate(360deg);opacity:0}}
.header{position:sticky;top:0;z-index:600;background:var(--navy);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--orange);}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end;}
.header-badge{font-size:10px;font-weight:700;color:var(--orange);border:1px solid rgba(244,121,32,.4);border-radius:20px;padding:3px 10px;letter-spacing:.08em;text-transform:uppercase;}
.restart-top{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);border-radius:8px;padding:5px 12px;font-size:12px;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;}
.restart-top:hover{border-color:var(--orange);color:var(--orange);}
.main{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:2rem 1.5rem 3rem;}
.mascot-area{display:flex;align-items:flex-end;gap:20px;margin-bottom:1.5rem;}
.dog-wrap{flex-shrink:0;position:relative;width:120px;height:120px;}
.dog-svg{width:120px;height:120px;object-fit:contain;transition:transform .3s ease;}
.dog-wrap.happy .dog-svg{animation:dogWag .6s ease infinite alternate;}
.dog-wrap.thinking .dog-svg{animation:dogThink 2s ease infinite;}
.dog-wrap.excited .dog-svg{animation:dogBounce .4s ease infinite alternate;}
@keyframes dogWag{0%{transform:rotate(-2deg) translateY(0)}100%{transform:rotate(2deg) translateY(-3px)}}
@keyframes dogThink{0%,100%{transform:rotate(0)}25%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}}
@keyframes dogBounce{0%{transform:translateY(0) scale(1)}100%{transform:translateY(-6px) scale(1.03)}}
@keyframes tailWag{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(30deg)}}
.dog-tail{animation:tailWag .45s ease infinite;transform-origin:15% 85%;}
.speech-bubble{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r) var(--r) var(--r) 4px;padding:16px 20px;position:relative;box-shadow:0 4px 20px rgba(11,31,58,.07);min-height:70px;animation:bubbleIn .3s cubic-bezier(.34,1.56,.64,1) both;}
.speech-bubble::before{content:'';position:absolute;left:-10px;bottom:20px;border:8px solid transparent;border-right-color:var(--border);}
.speech-bubble::after{content:'';position:absolute;left:-8px;bottom:21px;border:7px solid transparent;border-right-color:var(--bg2);}
@keyframes bubbleIn{from{opacity:0;transform:scale(.95) translateX(-5px)}to{opacity:1;transform:scale(1) translateX(0)}}
.speech-text{font-size:15px;line-height:1.65;color:var(--text);font-weight:600;}
.dog-name-tag{font-size:10px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;display:flex;align-items:center;gap:5px;}
.dog-name-tag::before{content:'😎';font-size:11px;}
.typing-dots{display:flex;gap:5px;align-items:center;height:20px;}
.typing-dots span{width:8px;height:8px;border-radius:50%;background:var(--orange);opacity:.5;animation:dot 1.2s infinite ease-in-out;}
.typing-dots span:nth-child(2){animation-delay:.2s}.typing-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.progress-wrap{margin-bottom:1.25rem;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.progress-track{height:6px;background:#E8EDF5;border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange-light));border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.progress-steps{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.step-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#E8EDF5;color:var(--muted);transition:all .3s;}
.step-pill.active{background:var(--navy);color:var(--orange);}
.step-pill.done{background:var(--green-bg);color:var(--green);}
.convo-log{margin-bottom:1rem;}
.user-answer{display:flex;justify-content:flex-end;margin-bottom:10px;animation:answerIn .25s ease both;}
@keyframes answerIn{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.user-bubble{background:var(--navy);color:#fff;border-radius:var(--r) var(--r) 4px var(--r);padding:10px 16px;font-size:14px;font-weight:600;max-width:75%;box-shadow:0 4px 14px rgba(11,31,58,.2);}
.system-note{background:var(--orange-pale);border:1px solid rgba(244,121,32,.3);border-radius:var(--rs);padding:10px 16px;font-size:13px;font-weight:600;color:#7A3A10;margin-bottom:12px;text-align:center;animation:bubbleIn .3s ease both;}
.options-area{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1rem;animation:optionsIn .3s ease both;}
@keyframes optionsIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.opt-btn{padding:10px 18px;border:2px solid var(--border);border-radius:50px;background:var(--bg2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s cubic-bezier(.34,1.56,.64,1);}
.opt-btn:hover{border-color:var(--orange);background:var(--orange-pale);color:var(--navy);transform:translateY(-2px);box-shadow:0 4px 14px rgba(244,121,32,.22);}
.opt-btn.yes-btn{border-color:#B8DFC9;color:var(--green);}
.opt-btn.yes-btn:hover{background:var(--green-bg);border-color:var(--green);}
.opt-btn.no-btn{border-color:#F0C4B8;color:#993C1D;}
.opt-btn.no-btn:hover{background:#FAECE7;border-color:#993C1D;}
.text-input-area{display:flex;gap:8px;margin-bottom:1rem;animation:optionsIn .3s ease both;}
.text-input-area textarea{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);resize:none;min-height:48px;max-height:120px;line-height:1.5;transition:border-color .2s;background:#fff;}
.text-input-area textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,121,32,.12);}
.send-btn{padding:12px 20px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;height:48px;transition:all .18s;}
.send-btn:hover{background:#1E3A5F;transform:translateY(-1px);}
.summary-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:0 8px 30px rgba(11,31,58,.1);}
.summary-head{background:var(--navy);padding:18px 24px;display:flex;align-items:center;justify-content:space-between;}
.summary-head-title{font-family:'Playfair Display',serif;font-size:18px;color:#fff;}
.agreement-chip{background:var(--orange);color:#fff;font-size:11px;font-weight:800;padding:5px 14px;border-radius:20px;text-transform:uppercase;letter-spacing:.05em;}
.summary-body{padding:20px 24px;}
.summary-section-head{font-size:12px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--orange-pale);}
.summary-row{display:flex;gap:12px;align-items:flex-start;padding:7px 0;border-bottom:1px solid #F0F4F9;font-size:13px;}
.summary-row:last-child{border-bottom:none;}
.summary-lbl{font-weight:700;color:var(--muted);min-width:180px;flex-shrink:0;font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding-top:1px;}
.summary-val{color:var(--text);font-weight:600;line-height:1.5;}
.next-steps-box{background:var(--green-bg);border:1.5px solid #B8DFC9;border-radius:var(--rs);padding:16px 18px;margin:16px 0;}
.next-steps-label{font-size:11px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;}
.next-steps-box p{font-size:13px;color:#1A4A2E;font-weight:600;line-height:1.65;}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:14px;padding:14px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .18s;}
.dl-btn:hover{background:#1E3A5F;transform:translateY(-2px);box-shadow:0 6px 20px rgba(11,31,58,.25);}
#email-status{margin-top:10px;font-size:13px;font-weight:700;display:none;padding:10px 14px;border-radius:var(--rs);}
.new-intake-btn{display:block;width:100%;margin-top:8px;padding:11px;background:none;border:2px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:all .18s;}
.new-intake-btn:hover{border-color:var(--navy);color:var(--navy);}
.merlin-complete{display:flex;align-items:center;gap:14px;background:var(--orange-pale);border:1.5px solid rgba(244,121,32,.35);border-radius:var(--r);padding:16px 20px;margin-bottom:16px;animation:bubbleIn .4s cubic-bezier(.34,1.56,.64,1) both;}
.merlin-complete-text{font-size:14px;font-weight:700;color:#7A3A10;line-height:1.5;}
.merlin-complete-text strong{color:var(--navy);}
.disclaimer{text-align:center;font-size:11px;color:var(--muted);font-weight:600;padding:1rem 0 0;font-style:italic;}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:8px 16px;
  border:2px solid var(--border);border-radius:50px;
  background:var(--bubble-bg);
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;
  color:var(--muted);cursor:pointer;
  transition:all .18s;margin-bottom:8px;
}
.back-btn:hover{border-color:var(--navy);color:var(--navy);background:#F0F4F8;}
.back-btn svg{width:14px;height:14px;}
.multiselect-area{display:flex;flex-direction:column;gap:6px;margin-bottom:1rem;animation:optionsIn .3s ease both;}
.multiselect-opt{display:flex;align-items:center;gap:10px;padding:10px 16px;border:2px solid var(--border);border-radius:var(--rs);background:var(--bubble-bg);font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;transition:all .18s;}
.multiselect-opt:hover{border-color:var(--orange);background:var(--orange-pale);}
.multiselect-opt.selected{border-color:var(--orange);background:var(--orange-pale);color:var(--navy);}
.multiselect-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--orange);cursor:pointer;flex-shrink:0;}
.multiselect-confirm{margin-top:4px;padding:10px 20px;background:var(--navy);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;align-self:flex-start;}
.multiselect-confirm:hover{background:#1E3A5F;}
.date-input-area{display:flex;gap:8px;margin-bottom:1rem;animation:optionsIn .3s ease both;}
.date-input-area input[type=date]{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:#fff;transition:border-color .2s;height:48px;}
.date-input-area input[type=date]:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,121,32,.12);}
.address-suggestions{position:absolute;z-index:100;background:#fff;border:1.5px solid var(--border);border-radius:var(--rs);box-shadow:0 4px 20px rgba(0,0,0,.1);max-height:200px;overflow-y:auto;width:100%;}
.address-suggestion{padding:10px 14px;font-size:13px;cursor:pointer;font-family:'Nunito',sans-serif;}
.address-suggestion:hover{background:var(--orange-pale);}

/* ── Reviewer Mode ─────────────────────────────── */
.header-action-btn{background:none;color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.25);border-radius:50px;padding:5px 12px;font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:all .2s;white-space:nowrap;}
.header-action-btn:hover{color:#fff;border-color:rgba(255,255,255,.6);}
.header-action-btn.reviewer:hover{border-color:var(--orange);color:var(--orange);}

.modal-overlay{position:fixed;inset:0;background:rgba(11,31,58,.7);z-index:1000;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:#fff;border-radius:var(--r);padding:28px 32px;max-width:480px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:slideUp .25s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-family:'Playfair Display',serif;font-size:20px;color:var(--navy);margin-bottom:6px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;}
.modal-input{width:100%;padding:11px 14px;border:2px solid var(--border);border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);box-sizing:border-box;margin-bottom:12px;transition:border-color .2s;}
.modal-input:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(244,121,32,.12);}
.modal-btn{width:100%;padding:12px;background:var(--navy);color:#fff;border:none;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;margin-bottom:8px;}
.modal-btn:hover{background:#1E3A5F;}
.modal-btn.secondary{background:none;color:var(--muted);border:1.5px solid var(--border);}
.modal-btn.secondary:hover{border-color:var(--navy);color:var(--navy);}
.modal-btn.approve{background:var(--green);color:#fff;}
.modal-btn.approve:hover{background:#1F6B3E;}
.modal-error{font-size:12px;color:#993C1D;font-weight:700;margin:-6px 0 10px;}
.review-panel{max-width:780px;margin:0 auto;padding:2rem 1.5rem 3rem;}
.review-section-head{font-size:12px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.08em;margin:20px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--orange-pale);}
.review-row{display:flex;gap:12px;align-items:flex-start;padding:8px 0;border-bottom:1px solid #F0F4F9;}
.review-row:last-child{border-bottom:none;}
.review-lbl{font-weight:700;color:var(--muted);min-width:200px;flex-shrink:0;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding-top:8px;}
.review-val{flex:1;}
.review-val input,.review-val textarea,.review-val select{width:100%;padding:7px 10px;border:1.5px solid var(--border);border-radius:6px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--text);background:#fff;box-sizing:border-box;transition:border-color .2s;resize:none;}
.review-val input:focus,.review-val textarea:focus,.review-val select:focus{outline:none;border-color:var(--orange);}
.review-edited{border-color:var(--orange)!important;background:#FEF6EE!important;}
.review-header{background:var(--navy);padding:18px 24px;border-radius:var(--r) var(--r) 0 0;display:flex;align-items:center;justify-content:space-between;}
.review-id-badge{background:var(--orange);color:#fff;font-size:11px;font-weight:800;padding:4px 12px;border-radius:20px;letter-spacing:.05em;}
.asana-status{padding:10px 14px;border-radius:var(--rs);font-size:13px;font-weight:700;margin-top:10px;display:none;}
@keyframes idleBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes idleWag{0%,45%,100%{transform:rotate(0deg)}50%{transform:rotate(3deg)}55%{transform:rotate(-2deg)}60%{transform:rotate(2deg)}65%{transform:rotate(-1deg)}70%{transform:rotate(0deg)}}
.dog-wrap:not(.happy):not(.thinking):not(.excited) .dog-svg{animation:idleBob 3s ease-in-out infinite,idleWag 5s ease-in-out infinite;}
.paw-trail{position:fixed;pointer-events:none;z-index:9999;font-size:18px;animation:pawFade .8s ease forwards;}
@keyframes pawFade{0%{opacity:.8;transform:scale(1)}100%{opacity:0;transform:scale(.5) translateY(-10px)}}
</style>
<!-- Google Maps Places API — replace YOUR_GOOGLE_MAPS_API_KEY with your actual key -->
<!-- Get a key at: https://console.cloud.google.com → APIs & Services → Credentials -->
<!-- Make sure "Places API" is enabled for the key -->
<script>
var GOOGLE_MAPS_API_KEY = 'YOUR_GOOGLE_MAPS_API_KEY';
var _googleMapsLoaded = false;
var _googleMapsCallbacks = [];
function _onGoogleMapsLoaded(){ _googleMapsLoaded=true; _googleMapsCallbacks.forEach(function(fn){fn();}); _googleMapsCallbacks=[]; }
function loadGoogleMaps(cb){
  if(_googleMapsLoaded){ cb(); return; }
  _googleMapsCallbacks.push(cb);
  if(document.getElementById('google-maps-script')) return;
  if(GOOGLE_MAPS_API_KEY==='YOUR_GOOGLE_MAPS_API_KEY') return; // No key set yet
  var s=document.createElement('script');
  s.id='google-maps-script';
  s.src='https://maps.googleapis.com/maps/api/js?key='+GOOGLE_MAPS_API_KEY+'&libraries=places&callback=_onGoogleMapsLoaded';
  s.async=true; s.defer=true;
  document.head.appendChild(s);
}
</script>
</head>
<body>

// INTERACTION
function clearI(){document.getElementById('interaction-area').innerHTML='';}

function showBack(){
  // Only show back button if there's history to go back to
  if(!S.history || S.history.length === 0) return;
  var area = document.getElementById('interaction-area');
  var btn = document.createElement('button');
  btn.className = 'back-btn';
  btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg> Back';
  btn.addEventListener('click', function(){ goBack(); });
  area.insertBefore(btn, area.firstChild);
}

function goBack(){
  if(!S.history || S.history.length === 0) return;
  // Pop the last state snapshot
  var prev = S.history.pop();
  // Restore state from snapshot
  S.phase          = prev.phase;
  S.formKey        = prev.formKey;
  S.gIdx           = prev.gIdx;
  S.fIdx           = prev.fIdx;
  S.merlinEntity   = prev.merlinEntity;
  S.generalAnswers = prev.generalAnswers.slice();
  S.formAnswers    = prev.formAnswers.slice();
  // Clear the UI
  clearI();
  document.getElementById('convo-log').innerHTML = '';
  document.getElementById('summary-area').innerHTML = '';
  // Rebuild the conversation log from history answers
  rebuildLog();
  // Resume asking from the restored position
  if(S.phase === 'general'){
    setProgress((S.gIdx/GENERAL.length)*30, 0);
    askGeneral();
  } else if(S.phase === 'triage'){
    setProgress(32, 1);
    startTriage();
  } else if(S.phase === 'form'){
    var pct = 35 + (S.fIdx / (FORMS[S.formKey]?FORMS[S.formKey].questions.length:1)) * 60;
    setProgress(pct, pct<55?2:pct<85?3:4);
    askForm();
  }
}

function rebuildLog(){
  // Replay all recorded answers into the conversation log so the user sees context
  (S.generalAnswers||[]).forEach(function(a){
    if(a.answer !== 'N/A') logAnswer(a.answer);
  });
  (S.formAnswers||[]).forEach(function(a){
    if(a.answer !== 'N/A (skipped)' && a.answer !== 'N/A') logAnswer(a.answer);
  });
}

function pushHistory(){
  // Save current state snapshot before advancing
  S.history.push({
    phase:          S.phase,
    formKey:        S.formKey,
    gIdx:           S.gIdx,
    fIdx:           S.fIdx,
    merlinEntity:   S.merlinEntity,
    generalAnswers: S.generalAnswers.slice(),
    formAnswers:    S.formAnswers.slice(),
  });
}
function showOpts(opts,cb){
  clearI();const a=document.createElement('div');a.className='options-area';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt-btn'+(o==='Yes'?' yes-btn':o==='No'?' no-btn':'');
    b.textContent=o;
    b.onclick=()=>{
      clearI();logAnswer(o);setMood('happy');
      // Exclude options where "I will specify" is a label for a separate follow-up question
      // (e.g. "Specific date — I will specify" which triggers a date picker, not free text)
      const isDateOrStructuredFollowup = 
        o.startsWith('Specific date') ||
        o.startsWith('Specific products only') ||
        o.startsWith('Set time period') ||
        o.startsWith('One-time');
      const needsDetail = !isDateOrStructuredFollowup && (
        o.toLowerCase().startsWith('other') ||
        /i will (specify|describe|explain|note|list)/i.test(o)
      );
      if(needsDetail){
        setTimeout(()=>{
          // Build a natural prompt based on which trigger matched
          let prompt;
          if(o.toLowerCase().startsWith('other')){
            prompt = "Got it — please describe what 'Other' means in your situation. 🐾";
          } else {
            // Strip the "— I will specify/describe/etc." suffix to give context
            const base = o.replace(/\s*[—–-]+\s*I will (specify|describe|explain|note|list).*/i,'').trim();
            prompt = "Please " + o.match(/I will (specify|describe|explain|note|list)/i)[0].replace('I will','') + ' that now' + (base ? ' ('+base+')' : '') + ': 🐾';
          }
          setSpeech(prompt,'thinking',200);
          // Prefix the answer with the original choice so context is preserved in the summary
          const prefix = o.replace(/\s*[—–-]+\s*I will (specify|describe|explain|note|list).*/i,'').trim() || o;
          setTimeout(()=>showText(function(detail){cb(prefix+' — '+detail);}),650);
        },100);
      } else {
        setTimeout(()=>cb(o),100);
      }
    };
    a.appendChild(b);
  });
  document.getElementById('interaction-area').appendChild(a);
}

function showMultiSelect(opts, cb){
  clearI();
  var area = document.createElement('div');
  area.className = 'multiselect-area';
  var selected = [];

  opts.forEach(function(o){
    var row = document.createElement('div');
    row.className = 'multiselect-opt';
    var chk = document.createElement('input');
    chk.type = 'checkbox';
    var lbl = document.createElement('span');
    lbl.textContent = o;
    chk.onchange = function(){
      if(chk.checked){
        row.classList.add('selected');
        if(selected.indexOf(o) < 0) selected.push(o);
      } else {
        row.classList.remove('selected');
        selected = selected.filter(function(x){ return x !== o; });
      }
    };
    row.onclick = function(e){
      if(e.target !== chk){ chk.checked = !chk.checked; chk.onchange(); }
    };
    row.appendChild(chk);
    row.appendChild(lbl);
    area.appendChild(row);
  });

  var confirmBtn = document.createElement('button');
  confirmBtn.className = 'multiselect-confirm';
  confirmBtn.textContent = 'Confirm Selection 🐾';
  confirmBtn.onclick = function(){
    if(selected.length === 0){ setSpeech('Please select at least one option. 🐾','thinking',0); return; }
    // If "Other" is among selected, prompt for detail
    var hasOther = selected.some(function(s){ return s.toLowerCase().startsWith('other'); });
    var nonOther = selected.filter(function(s){ return !s.toLowerCase().startsWith('other'); });
    clearI();
    if(hasOther){
      var display = selected.join(', ');
      logAnswer(display);
      setMood('happy');
      setTimeout(function(){
        setSpeech("Got it — please describe what 'Other' means in your situation. 🐾",'thinking',200);
        setTimeout(function(){
          showText(function(detail){
            cb(display + ' (Other: ' + detail + ')');
          });
        },650);
      },100);
    } else {
      var answer = selected.join(', ');
      logAnswer(answer);
      setMood('happy');
      setTimeout(function(){ cb(answer); }, 100);
    }
  };
  area.appendChild(confirmBtn);
  document.getElementById('interaction-area').appendChild(area);
}

  dropdown.style.cssText='position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1.5px solid var(--border);border-radius:var(--rs);box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:1000;display:none;max-height:220px;overflow-y:auto;';

  var rowStyles='padding:10px 14px;font-size:13px;font-family:Nunito,sans-serif;cursor:pointer;border-bottom:1px solid #F0F4F9;line-height:1.4;';

  var btn=document.createElement('button');

  btn.style.alignSelf='flex-start';

  else if(S.phase==='form'&&S.formKey&&FORMS[S.formKey]) isLast=(S.fIdx>=FORMS[S.formKey].questions.length-1);
  btn.innerHTML=isLast?'Submit 🐾':'Next 🐾';

  function go(){
    var v=inp.value.trim();
    if(!v)return;
    dropdown.style.display='none';
    clearI();logAnswer(v);setMood('happy');setTimeout(function(){cb(v);},100);
  }
  btn.onclick=go;
  inp.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();go();}});

  // Google Places autocomplete
  var sessionToken=null;
  var debounceTimer=null;

  function fetchSuggestions(input){
    if(!input||input.length<3){dropdown.style.display='none';return;}
    if(!_googleMapsLoaded){
      // Fall back to manual entry if no Google Maps
      dropdown.style.display='none';
      return;
    }
    clearTimeout(debounceTimer);
    debounceTimer=setTimeout(function(){
      try{
        if(!sessionToken) sessionToken=new google.maps.places.AutocompleteSessionToken();
        var svc=new google.maps.places.AutocompleteService();
        svc.getPlacePredictions({
          input:input,
          sessionToken:sessionToken,
          types:['address']
        },function(predictions,status){
          dropdown.innerHTML='';
          if(status!==google.maps.places.PlacesServiceStatus.OK||!predictions){
            dropdown.style.display='none';
            return;
          }
          predictions.forEach(function(pred){
            var item=document.createElement('div');
            item.style.cssText=rowStyles;
            // Bold the matched parts
            var desc=pred.description;
            item.textContent=desc;
            item.addEventListener('mousedown',function(e){
              e.preventDefault(); // prevent input blur
              inp.value=desc;
              dropdown.style.display='none';
              sessionToken=null; // reset after selection
            });
            item.addEventListener('mouseover',function(){item.style.background='var(--orange-pale)';});
            item.addEventListener('mouseout',function(){item.style.background='';});
            dropdown.appendChild(item);
          });
          dropdown.style.display='block';
        });
      }catch(err){
        dropdown.style.display='none';
      }
    },250);
  }

  inp.addEventListener('input',function(){fetchSuggestions(inp.value);});
  inp.addEventListener('blur',function(){setTimeout(function(){dropdown.style.display='none';},200);});

  // No-API fallback notice
  if(GOOGLE_MAPS_API_KEY==='YOUR_GOOGLE_MAPS_API_KEY'){
    var notice=document.createElement('div');
    notice.style.cssText='font-size:11px;color:var(--muted);font-style:italic;margin-top:4px;padding:0 4px;';
    notice.textContent='Address autocomplete requires a Google Maps API key (see setup instructions). You can still type the address manually.';
    inputWrap.appendChild(notice);
  }

  inputWrap.appendChild(inp);
  inputWrap.appendChild(dropdown);

  var row=document.createElement('div');
  row.style.cssText='display:flex;gap:8px;align-items:flex-start;width:100%;';
  row.appendChild(inputWrap);
  row.appendChild(btn);
  area.appendChild(row);

  document.getElementById('interaction-area').appendChild(area);

  // Load Google Maps if key is set
  loadGoogleMaps(function(){});
  inp.focus();
}

// ── GENERAL QUESTIONS FLOW ─────────────────────────────────────────
function askGeneral(){
  while(S.gIdx<GENERAL.length){
    const q=GENERAL[S.gIdx];
    if(q.skip&&q.skip(S.generalAnswers)){S.generalAnswers.push({question:q.q,answer:'N/A'});S.gIdx++;continue;}
    break;
  }
  if(S.gIdx>=GENERAL.length){startTriage();return;}
  const pct=(S.gIdx/GENERAL.length)*30;
  setProgress(pct,0);
  const q=GENERAL[S.gIdx];
  setSpeech(q.q,'thinking',300);
  setTimeout(()=>{
    if(q.type==='opts')       showOpts(q.opts,ans=>recGeneral(q.q,ans));
    else if(q.type==='yesno') showOpts(['Yes','No'],ans=>recGeneral(q.q,ans));
    else if(q.type==='yesno_detail') showYND(q.yesPrompt,ans=>recGeneral(q.q,ans),q.detailOpts);
    else if(q.type==='multiselect') showMultiSelect(q.opts,ans=>recGeneral(q.q,ans));
    else if(q.type==='date')  showDateInput(ans=>recGeneral(q.q,ans));
    else if(q.type==='address') showAddressInput(ans=>recGeneral(q.q,ans));
    else                      showText(ans=>recGeneral(q.q,ans));
    showBack();
  },720);
}
function recGeneral(q,ans){
  pushHistory();
  // Capture merlin entity from first question
  if(S.gIdx===0) S.merlinEntity=ans;
  S.generalAnswers.push({question:q,answer:ans});
  S.gIdx++;

  setSpeech(rq(QA),'happy',150);
  setTimeout(askGeneral,800);
}

// ── TRIAGE ─────────────────────────────────────────────────────────
function startTriage(){
  setProgress(32,1);
  logNote("General questions complete! Now let's identify the right agreement.");
  const node=TRIAGE[0];
  setSpeech(node.q,'thinking',400);
  setTimeout(()=>{
    showOpts(node.opts.map(o=>o.label),ans=>{
      const chosen=TRIAGE[0].opts.find(o=>o.label===ans);
      setSpeech(rq(QA),'happy',200);
      setTimeout(()=>startForm(chosen.next),900);
    });
    showBack();
  },750);
}

// ── FORM FLOW ──────────────────────────────────────────────────────
function startForm(key){
  pushHistory();
  S.formKey=key; S.formAnswers=[]; S.fIdx=0; S.phase='form';
  const form=FORMS[key];
  logNote(`✅ Agreement identified: ${form.emoji} ${form.label}`);
  setSpeech(form.intro,'happy',300);
  setProgress(35,2);
  setTimeout(askForm,900);
}
function askForm(){
  const form=FORMS[S.formKey];
  while(S.fIdx<form.questions.length){
    const q=form.questions[S.fIdx];
    if(q.skip&&q.skip(S.formAnswers)){S.formAnswers.push({question:q.q,answer:'N/A (skipped)'});S.fIdx++;continue;}
    break;
  }
  if(S.fIdx>=form.questions.length){onDone();return;}
  const q=form.questions[S.fIdx];
  const done=S.formAnswers.filter(a=>a.answer!=='N/A (skipped)').length;
  const total=form.questions.length;
  const pct=35+(done/total)*60;
  const si=pct<55?2:pct<85?3:4;
  setProgress(pct,si);
  setSpeech(q.q,'thinking',250);
  setTimeout(()=>{
    if(q.type==='opts')       showOpts(q.opts,ans=>recForm(q.q,ans));
    else if(q.type==='yesno') showOpts(['Yes','No'],ans=>recForm(q.q,ans));
    else if(q.type==='yesno_detail') showYND(q.yesPrompt,ans=>recForm(q.q,ans),q.detailOpts);
    else if(q.type==='multiselect') showMultiSelect(q.opts,ans=>recForm(q.q,ans));
    else if(q.type==='date')  showDateInput(ans=>recForm(q.q,ans));
    else if(q.type==='address') showAddressInput(ans=>recForm(q.q,ans));
    else                      showText(ans=>recForm(q.q,ans));
    showBack();
  },700);
}
function recForm(q,ans){
  pushHistory();
  S.formAnswers.push({question:q,answer:ans});S.fIdx++;

  // Classified information stop for Consulting Agreement
  if(S.formKey==='CONSULTING' && S.fIdx===1 && ans==='Yes'){
    clearI();
    setProgress(0,0);
    setSpeech('This consulting engagement may involve classified information. Please stop filling out this form and contact the legal team directly to discuss further before proceeding.','thinking',300);
    setTimeout(function(){
      var area = document.getElementById('interaction-area');
      var box = document.createElement('div');
      box.style.cssText='background:#FAECE7;border:1.5px solid #F0997B;border-radius:12px;padding:18px 20px;margin-bottom:1rem;';
      box.innerHTML='<div style="font-size:13px;font-weight:800;color:#993C1D;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;">⚠️ Action Required</div>'
        +'<div style="font-size:14px;font-weight:600;color:#7A2A10;line-height:1.6;">This intake form cannot be completed for matters involving classified information. Please contact the Merlin legal team directly to discuss your request.</div>'

function onDone(){
  setProgress(100,4);S.phase='complete';clearI();

// ── SUMMARY ────────────────────────────────────────────────────────
function renderSummary(){
  const area=document.getElementById('summary-area');
  const form=FORMS[S.formKey];
  const recipients=getEmailRecipients(S.merlinEntity);
  area.innerHTML='';
  const complete=document.createElement('div');
  complete.className='merlin-complete';
  complete.innerHTML=`<span style="font-size:42px">🐾</span>
    <div class="merlin-complete-text">
      <strong>Intake complete!</strong> I've collected everything the legal team needs.
      This will be emailed to <strong>${recipients.primaryName}</strong>${recipients.cc ? ' and copied to <strong>' + recipients.cc + '</strong>' : ''}.
      Download the Word document below too!
    </div>`;
  area.appendChild(complete);
  const card=document.createElement('div');
  card.className='summary-card';
  let h=`<div class="summary-head">
    <span class="summary-head-title">Intake Summary</span>
    <span class="agreement-chip">${form.emoji} ${form.label}</span>
  </div><div class="summary-body">`;
  // General section
  h+=`<div class="summary-section-head">General Information</div>`;
  S.generalAnswers.filter(a=>a.answer!=='N/A').forEach(a=>{
    const lbl=a.question.replace(/\*|_/g,'').substring(0,80)+(a.question.length>80?'…':'');
    h+=`<div class="summary-row"><span class="summary-lbl">${lbl}</span><span class="summary-val">${a.answer.replace(/</g,'&lt;')}</span></div>`;
  });
  // Form section
  h+=`<div class="summary-section-head">${form.label} — Specific Details</div>`;
  S.formAnswers.filter(a=>a.answer!=='N/A (skipped)').forEach(a=>{
    const lbl=a.question.replace(/\*|_/g,'').substring(0,80)+(a.question.length>80?'…':'');
    h+=`<div class="summary-row"><span class="summary-lbl">${lbl}</span><span class="summary-val">${a.answer.replace(/</g,'&lt;')}</span></div>`;
  });
  h+=`<div id="email-status"></div>`;
  h+=`</div>`;
  card.innerHTML=h;
  area.appendChild(card);

  // Create button via JS (not innerHTML) to ensure onclick works reliably
  const dlBtn = document.createElement('button');
  dlBtn.className = 'dl-btn';
  dlBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Word Doc &amp; Email Legal Team';
  dlBtn.addEventListener('click', function(){ generateDocx(); });
  card.querySelector('.summary-body').appendChild(dlBtn);

  const newIntakeBtn = document.createElement('button');
  newIntakeBtn.className = 'new-intake-btn';
  newIntakeBtn.textContent = '🐾 Start a new intake with Merlin';
  newIntakeBtn.addEventListener('click', function(){ restartFlow(); });
  card.querySelector('.summary-body').appendChild(newIntakeBtn);
  area.scrollIntoView({behavior:'smooth',block:'start'});
}

  function xe(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&apos;'); }

  genRows.push(['Approved by', sub.approvedBy+' on '+new Date(sub.approvedAt).toLocaleString()]);

  function u16(n){return [n&255,(n>>8)&255];}

  function crc32(b){var t=[];for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[i]=c;}var c=0xFFFFFFFF;for(var i=0;i<b.length;i++)c=t[(c^b[i])&255]^(c>>>8);return(c^0xFFFFFFFF)>>>0;}

  Object.keys(DOCX_FILES_B64).forEach(function(n){addFile(n,b64Bytes(DOCX_FILES_B64[n]));});
  addFile('word/document.xml',strBytes(docXml));
  var cdFlat=[].concat.apply([],zipCD);
  var eocd=[0x50,0x4B,0x05,0x06].concat(u16(0),u16(0),u16(Object.keys(DOCX_FILES_B64).length+1),u16(Object.keys(DOCX_FILES_B64).length+1),u32(cdFlat.length),u32(zipOffset),u16(0));

  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download='APPROVED_'+sub.id+'_'+form.label.replace(/[^a-z0-9]/gi,'_')+'.docx';
  a.style.display='none'; document.body.appendChild(a); a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1500);
}

function approveSubmission(sub){
  // Apply any edits made in the review interface
  var submissions = {};
  try { submissions = JSON.parse(localStorage.getItem('merlin_submissions')||'{}'); } catch(e){}

  // Merge edits back into the submission
  var updatedSub = JSON.parse(JSON.stringify(sub));
  var genAnswers = (updatedSub.generalAnswers||[]).filter(function(a){ return a.answer && a.answer!=='N/A'; });
  var formAnswers = (updatedSub.formAnswers||[]).filter(function(a){ return a.answer && a.answer!=='N/A (skipped)' && a.answer!=='N/A'; });

  Object.keys(reviewEdits).forEach(function(key){
    if(key.startsWith('g_')){
      var i = parseInt(key.slice(2));
      if(genAnswers[i]) genAnswers[i].answer = reviewEdits[key];
    } else if(key.startsWith('f_')){
      var i = parseInt(key.slice(2));
      if(formAnswers[i]) formAnswers[i].answer = reviewEdits[key];
    }
  });

  var reviewerNotes = (document.getElementById('reviewer-notes')||{}).value||'';
  updatedSub.status = 'approved';
  updatedSub.approvedAt = new Date().toISOString();
  updatedSub.approvedBy = currentReviewer;
  updatedSub.reviewerNotes = reviewerNotes;
  submissions[sub.id] = updatedSub;
  try { localStorage.setItem('merlin_submissions', JSON.stringify(submissions)); } catch(e){}

  // Declare formLabel first so it's available for all steps below
  var formLabel = FORMS[updatedSub.formKey] ? FORMS[updatedSub.formKey].label : updatedSub.formLabel;

  // ── Generate approved Word doc for attachment ──────────────────
  try { generateApprovedDocx(updatedSub, formLabel); } catch(docErr){ console.log('Approved docx error:', docErr); }

  // ── Create Asana task ──────────────────────────────────────────
  var asanaStatus = document.getElementById('asana-status');
  if(asanaStatus){
    asanaStatus.style.display='block';
    asanaStatus.style.cssText='display:block;padding:12px 16px;border-radius:8px;font-weight:700;font-size:13px;margin-top:10px;background:#EAF3DE;color:#27500A;border:1px solid #b8dfc9;';
    asanaStatus.textContent='Creating Asana task…';
  }
  var taskName = '[Legal Intake] ' + formLabel + ' — ' + (updatedSub.merlinEntity||'Merlin') + ' — ' + sub.id;
  var taskNotes = buildAsanaTaskNotes(updatedSub, reviewerNotes, formLabel);

  createAsanaTask(taskName, taskNotes, function(success, msg){
    if(asanaStatus){
      if(success){
        asanaStatus.style.cssText='display:block;padding:12px 16px;border-radius:8px;font-weight:700;font-size:13px;margin-top:10px;background:#EAF3DE;color:#27500A;border:1px solid #b8dfc9;';
        asanaStatus.textContent='✓ Asana task created!';
      } else {
        asanaStatus.style.cssText='display:block;padding:12px 16px;border-radius:8px;font-weight:700;font-size:13px;margin-top:10px;background:#FFF8E6;color:#8B6914;border:1px solid #E8C97A;';
        asanaStatus.textContent='Asana: '+msg+' (task not created — check your API token and project GID)';
      }
    }
    // ── Send legal notification email via mailto ──────────────────
    setTimeout(function(){ sendLegalNotification(updatedSub, reviewerNotes, formLabel); }, 800);
  });
}

function buildAsanaTaskNotes(sub, reviewerNotes, formLabel){
  // Pull priority (index 2) and effective date (index 4) from general answers
  var priority = (sub.generalAnswers&&sub.generalAnswers[2]&&sub.generalAnswers[2].answer) ? sub.generalAnswers[2].answer : '';
  var specificDate = (sub.generalAnswers&&sub.generalAnswers[4]&&sub.generalAnswers[4].answer&&sub.generalAnswers[4].answer!=='N/A') ? sub.generalAnswers[4].answer : '';
  var agreementStart = (sub.generalAnswers&&sub.generalAnswers[3]&&sub.generalAnswers[3].answer) ? sub.generalAnswers[3].answer : '';

  var lines = [];
  lines.push('************************************************************************************');
  lines.push('**** ACTION REQUIRED: ATTACH THE APPROVED WORD DOCUMENT (.docx) TO THIS TASK.  ****');
  lines.push('**** THE FILE NAME STARTS WITH "APPROVED_INTAKE..."                            ****');
  lines.push('************************************************************************************');
  lines.push('');
  lines.push('=== SET THESE FIELDS IN ASANA ===');
  lines.push('PRIORITY:  ' + (priority||'Not specified') + '  <-- set in Asana Priority field');
  if(specificDate) lines.push('DUE DATE:  ' + specificDate + '  <-- set in Asana Due Date field');
  else if(agreementStart && agreementStart!=='TBD / Not yet determined') lines.push('AGREEMENT START: ' + agreementStart + '  <-- use as reference for due date');
  lines.push('=================================');
  lines.push('');
  lines.push('LEGAL INTAKE — APPROVED');
  lines.push('Submission ID: ' + sub.id);
  lines.push('Agreement Type: ' + formLabel);
  lines.push('Entity: ' + (sub.merlinEntity||''));
  lines.push('Submitted: ' + new Date(sub.submittedAt).toLocaleString());
  lines.push('Approved by: ' + sub.approvedBy + ' on ' + new Date(sub.approvedAt).toLocaleString());
  if(reviewerNotes) lines.push('Reviewer notes: ' + reviewerNotes);
  lines.push('');
  lines.push('--- GENERAL INFORMATION ---');
  (sub.generalAnswers||[]).filter(function(a){ return a.answer&&a.answer!=='N/A'; }).forEach(function(a){
    lines.push(a.question.replace(/[*_]/g,'')+': '+a.answer);
  });
  lines.push('');
  lines.push('--- '+formLabel.toUpperCase()+' ---');
  (sub.formAnswers||[]).filter(function(a){ return a.answer&&a.answer!=='N/A (skipped)'&&a.answer!=='N/A'; }).forEach(function(a){
    lines.push(a.question.replace(/[*_]/g,'')+': '+a.answer);
  });
  return lines.join('\n');
}

function createAsanaTask(name, notes, callback){
  if(ASANA_PROJECT_ID==='YOUR_PROJECT_ID'){
    callback(false, 'No Asana project ID configured — add your project ID to the ASANA_PROJECT_ID variable');
    return;
  }
  // Use Asana email-to-task: send to x+PROJECT_ID@mail.asana.com
  // Subject = task name, Body = task description
  var asanaEmail = 'x+'+ASANA_PROJECT_ID+'@mail.asana.com';
  var mailA = document.createElement('a');
  mailA.href = 'mailto:'+asanaEmail
    +'?cc='+encodeURIComponent('legal@themerlingroup.com')
    +'&subject='+encodeURIComponent(name)
    +'&body='+encodeURIComponent(notes);
  mailA.style.display = 'none';
  document.body.appendChild(mailA);
  mailA.click();
  setTimeout(function(){ document.body.removeChild(mailA); }, 1000);
  // Email-to-task fires asynchronously — report success optimistically
  callback(true, 'Asana task email sent to '+asanaEmail);
}

function sendLegalNotification(sub, reviewerNotes, formLabel){
  var lines = [];
  lines.push('APPROVED LEGAL INTAKE — ACTION REQUIRED');
  lines.push('');
  lines.push('This intake has been reviewed and approved by '+sub.approvedBy+' and is ready for legal team action.');
  lines.push('');
  lines.push('Submission ID: '+sub.id);
  lines.push('Agreement Type: '+formLabel);
  lines.push('Entity: '+(sub.merlinEntity||''));
  lines.push('Submitted: '+new Date(sub.submittedAt).toLocaleString());
  lines.push('Approved: '+new Date(sub.approvedAt).toLocaleString());
  if(reviewerNotes){ lines.push(''); lines.push('REVIEWER NOTES: '+reviewerNotes); }
  lines.push('');
  lines.push('--- GENERAL INFORMATION ---');
  (sub.generalAnswers||[]).filter(function(a){ return a.answer&&a.answer!=='N/A'; }).forEach(function(a){
    lines.push(a.question.replace(/[*_]/g,'')+': '+a.answer);
  });
  lines.push('');
  lines.push('--- '+formLabel.toUpperCase()+' ---');
  (sub.formAnswers||[]).filter(function(a){ return a.answer&&a.answer!=='N/A (skipped)'&&a.answer!=='N/A'; }).forEach(function(a){
    lines.push(a.question.replace(/[*_]/g,'')+': '+a.answer);
  });

  var subj = '[Legal Intake — APPROVED] '+formLabel+' — '+sub.id;
  var mailA = document.createElement('a');
  mailA.href = 'mailto:legal@themerlingroup.com'
    +'?subject='+encodeURIComponent(subj)
    +'&body='+encodeURIComponent(lines.join('\r\n'));
  mailA.style.display='none';
  document.body.appendChild(mailA);
  mailA.click();
  setTimeout(function(){ document.body.removeChild(mailA); },1000);

  // Show completion
  var asanaStatus = document.getElementById('asana-status');
  if(asanaStatus){
    setTimeout(function(){
      asanaStatus.style.cssText='display:block;padding:16px;border-radius:8px;font-weight:700;font-size:14px;margin-top:10px;background:#EAF3DE;color:#27500A;border:1px solid #b8dfc9;text-align:center;';
      asanaStatus.innerHTML='<div style="font-size:24px;margin-bottom:8px;">✓</div><div>Approved! Legal has been notified and an Asana task has been created.</div><div style="font-size:12px;margin-top:6px;font-weight:400;">Submission ID: '+sub.id+'</div>';
    }, 600);
  }
}

// ── RESTART & BOOT ─────────────────────────────────────────────────
function restartFlow(){
  S={phase:'general',formKey:null,generalAnswers:[],formAnswers:[],gIdx:0,fIdx:0,merlinEntity:null,history:[]};
  document.getElementById('convo-log').innerHTML='';
  document.getElementById('interaction-area').innerHTML='';
  document.getElementById('summary-area').innerHTML='';
  setProgress(0,0);
  startFlow();
}
function startFlow(){
  setMood('happy');
  // Step 1: show dots immediately
  const el=document.getElementById('speech-text');
  if(el) el.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';
  // Step 2: after 1 second, show the greeting
  setTimeout(function(){
    const el2=document.getElementById('speech-text');
    const bubble=document.getElementById('speech-bubble');
    if(el2) el2.textContent='Hey! I am Merlin, Merlin Cyber\'s coolest legal guide. I will start with a few general questions, then figure out exactly which agreement you need and walk you through it step by step. Let\'s roll!';
    if(bubble){ bubble.style.animation='none'; void bubble.offsetWidth; bubble.style.animation='bubbleIn .3s cubic-bezier(.34,1.56,.64,1) both'; }
    setMood('excited');
    // Step 3: after greeting is shown, ask first question
    setTimeout(function(){ askGeneral(); }, 2400);
  }, 1000);
}
window.addEventListener('load', function(){
  var rb = document.getElementById('restart-top-btn');
  if(rb) rb.addEventListener('click', function(){ restartFlow(); });
  // If this file has an embedded submission, open reviewer mode immediately
  if(EMBEDDED_SUBMISSION && EMBEDDED_SUBMISSION.id){
    document.getElementById('reviewer-btn').style.display = 'none';
    // Show reviewer login then auto-load the submission
    setTimeout(function(){
      openEmbeddedReview(EMBEDDED_SUBMISSION);
    }, 400);
  } else {
    startFlow();
  }
});

function openEmbeddedReview(sub){
  // Show a special welcome for reviewers opening a submission file
  var root = document.getElementById('modal-root');
  root.innerHTML = '';
  var overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = '<div class="modal-box">' +
    '<div class="modal-title">Review Requested</div>' +
    '<div class="modal-sub">A legal intake submission is embedded in this file and ready for your review.</div>' +
    '<div style="background:#F0F4F9;border-radius:8px;padding:12px 16px;margin-bottom:16px;">' +
    '<div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">Submission</div>' +
    '<div style="font-size:15px;font-weight:800;color:var(--navy)">' + sub.id + '</div>' +
    '<div style="font-size:13px;color:var(--muted);margin-top:2px;">' + sub.formLabel + ' &mdash; ' + new Date(sub.submittedAt).toLocaleDateString() + '</div>' +
    '</div>' +
    '<div style="font-size:12px;color:var(--muted);margin-bottom:16px;">Please enter your name and password to open the review.</div>' +
    '<input class="modal-input" id="erv-name" placeholder="Your name (hannah or rachel)" autocomplete="off"/>' +
    '<input class="modal-input" id="erv-pass" type="password" placeholder="Password" autocomplete="off"/>' +
    '<div class="modal-error" id="erv-err" style="display:none">Incorrect credentials.</div>' +
    '<button class="modal-btn" onclick="submitEmbeddedLogin()">Open Review</button>' +
    '</div>';
  root.appendChild(overlay);
  setTimeout(function(){ var el=document.getElementById('erv-name'); if(el) el.focus(); },200);
  document.getElementById('erv-pass').onkeydown = function(e){ if(e.key==='Enter') submitEmbeddedLogin(); };
}

function submitEmbeddedLogin(){
  var name = (document.getElementById('erv-name').value||'').trim().toLowerCase();
  var pass = document.getElementById('erv-pass').value||'';
  var err = document.getElementById('erv-err');
  if(REVIEWER_PASSWORDS[name] && REVIEWER_PASSWORDS[name]===pass){
    currentReviewer = name;
    closeModal();
    openReviewInterface(EMBEDDED_SUBMISSION);
  } else {
    err.style.display = 'block';
    err.textContent = 'Incorrect name or password.';
  }
}
